<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .calculator {
      background: #16213e;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      width: 320px;
    }

    .display {
      background: #0f3460;
      border-radius: 12px;
      padding: 20px 16px 12px;
      margin-bottom: 20px;
      text-align: right;
      min-height: 90px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .display .expression {
      color: #a8b2d8;
      font-size: 14px;
      min-height: 20px;
      word-break: break-all;
      margin-bottom: 6px;
    }

    .display .result {
      color: #e2e8f0;
      font-size: 36px;
      font-weight: 300;
      word-break: break-all;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 500;
      padding: 18px 0;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      outline: none;
    }

    button:active {
      transform: scale(0.95);
    }

    .btn-number {
      background: #1a1a2e;
      color: #e2e8f0;
    }

    .btn-number:hover {
      background: #252550;
    }

    .btn-operator {
      background: #0f3460;
      color: #e94560;
    }

    .btn-operator:hover {
      background: #1a4a7a;
    }

    .btn-equals {
      background: #e94560;
      color: #fff;
      grid-column: span 2;
    }

    .btn-equals:hover {
      background: #c73652;
    }

    .btn-clear {
      background: #e94560;
      color: #fff;
    }

    .btn-clear:hover {
      background: #c73652;
    }

    .btn-special {
      background: #0f3460;
      color: #a8b2d8;
    }

    .btn-special:hover {
      background: #1a4a7a;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="buttons">
      <button class="btn-clear" onclick="clearAll()">AC</button>
      <button class="btn-special" onclick="toggleSign()">+/-</button>
      <button class="btn-special" onclick="percentage()">%</button>
      <button class="btn-operator" onclick="setOperator('/')">÷</button>

      <button class="btn-number" onclick="appendDigit('7')">7</button>
      <button class="btn-number" onclick="appendDigit('8')">8</button>
      <button class="btn-number" onclick="appendDigit('9')">9</button>
      <button class="btn-operator" onclick="setOperator('*')">×</button>

      <button class="btn-number" onclick="appendDigit('4')">4</button>
      <button class="btn-number" onclick="appendDigit('5')">5</button>
      <button class="btn-number" onclick="appendDigit('6')">6</button>
      <button class="btn-operator" onclick="setOperator('-')">−</button>

      <button class="btn-number" onclick="appendDigit('1')">1</button>
      <button class="btn-number" onclick="appendDigit('2')">2</button>
      <button class="btn-number" onclick="appendDigit('3')">3</button>
      <button class="btn-operator" onclick="setOperator('+')">+</button>

      <button class="btn-number" style="grid-column: span 2;" onclick="appendDigit('0')">0</button>
      <button class="btn-number" onclick="appendDecimal()">.</button>
      <button class="btn-equals" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    const ERROR_VALUE = 'Error';
    const OPERATOR_SYMBOLS = { '+': '+', '-': '−', '*': '×', '/': '÷' };

    let currentInput = '0';
    let previousInput = '';
    let operator = null;
    let shouldResetDisplay = false;

    const resultEl = document.getElementById('result');
    const expressionEl = document.getElementById('expression');

    function updateDisplay() {
      resultEl.textContent = currentInput;
    }

    function appendDigit(digit) {
      if (shouldResetDisplay) {
        currentInput = digit;
        shouldResetDisplay = false;
      } else {
        currentInput = currentInput === '0' ? digit : currentInput + digit;
      }
      updateDisplay();
    }

    function appendDecimal() {
      if (shouldResetDisplay) {
        currentInput = '0.';
        shouldResetDisplay = false;
      } else if (!currentInput.includes('.')) {
        currentInput += '.';
      }
      updateDisplay();
    }

    function setOperator(op) {
      if (operator && !shouldResetDisplay) {
        calculate(true);
      }
      previousInput = currentInput;
      operator = op;
      shouldResetDisplay = true;
      expressionEl.textContent = previousInput + ' ' + OPERATOR_SYMBOLS[op];
    }

    function calculate(silent = false) {
      if (!operator || !previousInput) return;
      const prev = parseFloat(previousInput);
      const curr = parseFloat(currentInput);
      let result;

      switch (operator) {
        case '+': result = prev + curr; break;
        case '-': result = prev - curr; break;
        case '*': result = prev * curr; break;
        case '/':
          if (curr === 0) {
            currentInput = ERROR_VALUE;
            expressionEl.textContent = '';
            operator = null;
            previousInput = '';
            updateDisplay();
            return;
          }
          result = prev / curr;
          break;
        default: return;
      }

      if (!silent) {
        expressionEl.textContent = previousInput + ' ' + OPERATOR_SYMBOLS[operator] + ' ' + currentInput + ' =';
      }

      // Avoid floating point noise
      result = parseFloat(result.toPrecision(12));
      currentInput = String(result);
      operator = null;
      previousInput = '';
      shouldResetDisplay = true;
      updateDisplay();
    }

    function clearAll() {
      currentInput = '0';
      previousInput = '';
      operator = null;
      shouldResetDisplay = false;
      expressionEl.textContent = '';
      updateDisplay();
    }

    function toggleSign() {
      if (currentInput !== '0' && currentInput !== ERROR_VALUE) {
        currentInput = String(parseFloat(currentInput) * -1);
        updateDisplay();
      }
    }

    function percentage() {
      if (currentInput !== ERROR_VALUE) {
        currentInput = String(parseFloat(currentInput) / 100);
        updateDisplay();
      }
    }

    // Keyboard support
    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') appendDigit(e.key);
      else if (e.key === '.') appendDecimal();
      else if (e.key === '+') setOperator('+');
      else if (e.key === '-') setOperator('-');
      else if (e.key === '*') setOperator('*');
      else if (e.key === '/') { e.preventDefault(); setOperator('/'); }
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Escape') clearAll();
      else if (e.key === 'Backspace') {
        if (shouldResetDisplay || currentInput === ERROR_VALUE) {
          clearAll();
        } else if (currentInput.length > 1) {
          currentInput = currentInput.slice(0, -1);
        } else {
          currentInput = '0';
        }
        updateDisplay();
      }
    });
  </script>
</body>
</html>
